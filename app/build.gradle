plugins {
    id 'com.android.application'
    id 'kotlin-android'
}

android {
    namespace 'net.kaneonexus.dartclicker'
    compileSdk 34

    defaultConfig {
        applicationId "net.kaneonexus.dartclicker"
        minSdk 26          // API 26 = Android 8.0, required for TYPE_ACCESSIBILITY_OVERLAY
        targetSdk 34
        versionCode 1
        versionName "1.0.0"
    }

    buildTypes {
        debug {
            debuggable true
            applicationIdSuffix ".debug"
        }
        release {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_11
        targetCompatibility JavaVersion.VERSION_11
    }

    kotlinOptions {
        jvmTarget = '11'
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'androidx.core:core-ktx:1.12.0'
}
